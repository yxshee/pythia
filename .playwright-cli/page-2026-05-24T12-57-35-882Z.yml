              - textbox "General Feedback" [ref=e348]: The hackathon format was builder-friendly and the repeat-submit policy reduced deadline risk. The biggest improvement would be publishing the final submission checklist earlier, especially required contact fields, public repo expectations, and the video-demo URL requirement. A sample excellent submission would also help teams calibrate how much proof to include in README/VERIFY artifacts.
