              - heading "(Arc OSS) If you are applying for Arc OSS, why should we choose your project? What primitives are you exposing that other builders could find useful? Compared to the code out there for Arc builders (mostly in circlefin/arc-* repos) what tools and flows do you add? (You can also answer in the CLI.)" [level=3] [ref=e311]:
                - generic [ref=e312]:
                  - text: (
                  - link "Arc OSS" [ref=e313] [cursor=pointer]:
                    - /url: https://arc-oss.thecanteenapp.com/
                  - text: ) If you are applying for Arc OSS, why should we choose your project? What primitives are you exposing that other builders could find useful?
                  - generic [ref=e315]: Compared to the code out there for Arc builders (mostly in circlefin/arc-* repos) what tools and flows do you add? (You can also answer in the CLI.)
              - textbox "(Arc OSS) If you are applying for Arc OSS, why should we choose your project? What primitives are you exposing that other builders could find useful? Compared to the code out there for Arc builders (mostly in circlefin/arc-* repos) what tools and flows do you add? (You can also answer in the CLI.)" [ref=e320]: "Pythia exposes reusable Arc primitives for other builders: a USDC-denominated UnlockMarket with registered trace IDs and price overrides, an isUnlocked gate for server-side content release, a nonce-bound API signature pattern, a read-only /api/rpc proxy that keeps Canteen RPC credentials server-side, package validators that prevent private trace leaks, and a cli-unlock smoke harness for reproducing the whole paid-access path. Compared with lower-level Arc examples, this is an app-level reference for AI agents that sell or gate auditable reasoning while preserving a clean public/private data split."
          - listitem [ref=e322]:
            - generic [ref=e324]:
              - generic [ref=e326]:
                - heading "Circle / Arc Feedback" [level=3] [ref=e327]:
                  - generic [ref=e328]: Circle / Arc Feedback
                - generic [ref=e329]:
                  - text: What worked with Circle / Arc, and where can Circle / Arc improve as a product and resources?
                  - text: (The specificity and quality of your answer might win you a feedback award!)
              - textbox "Circle / Arc Feedback" [ref=e334]: "Arc worked well for this use case because settlement is fast, fees are tiny, and USDC-denominated gas/payments make the demo legible to normal fintech users. The Canteen RPC and Arcscan made the audit trail easy to show in VERIFY.md. Improvements: publish an official wagmi/viem chain config, make the faucet/test USDC path more discoverable, document which JSON-RPC methods wallet providers should expect, and add a canonical paywall/unlock example that combines native USDC, signatures, and on-chain access checks."
          - listitem [ref=e336]:
