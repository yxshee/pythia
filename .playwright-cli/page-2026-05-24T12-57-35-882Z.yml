                  - generic "Required question" [ref=e200]: "*"
                - generic [ref=e201]: What problem is your project solving? What is compelling about this problem?
              - textbox "Problem Statement Required question" [ref=e206]: Prediction-market signals are easy to publish but hard to trust. Most AI pick feeds expose conclusions without auditable reasoning, source discipline, or a verifiable record that the paid reasoning shown to a user matches the trace the agent actually produced. Pythia solves the trust gap for AI-generated market recommendations by making provenance, payment, and the post-unlock reasoning path verifiable on Arc.
          - listitem [ref=e208]:
            - generic [ref=e210]:
              - generic [ref=e212]:
                - heading "Project Description Required question" [level=3] [ref=e213]:
                  - generic [ref=e214]: Project Description
                  - generic "Required question" [ref=e215]: "*"
                - generic [ref=e216]: Describe what your project does, how it works, and what tech you used.
              - textbox "Project Description Required question" [ref=e221]: Pythia / Agora Alpha is a non-custodial Polymarket recommendation agent. A Python analyst generates market picks, the public feed shows the free thesis and edge, and the full reasoning trace is gated behind an Arc USDC unlock. Trace hashes are anchored on Arc via TraceLog, UnlockMarket tracks paid access, and the Next.js app verifies a nonce-bound EIP-191 signature plus on-chain isUnlocked before returning the full trace from server-only storage. The stack uses Python, Solidity, Foundry, Next.js 16, wagmi/viem, Vercel, and Vercel Blob. Full build, test, deploy, wallet-smoke, screenshot, and packaging evidence is in VERIFY.md.
          - listitem [ref=e223]:
            - generic [ref=e225]:
              - generic [ref=e227]:
                - heading "Traction Required question" [level=3] [ref=e228]:
                  - generic [ref=e229]: Traction
                  - generic "Required question" [ref=e230]: "*"
                - generic [ref=e231]: How many real people have tried the product? How much validation were you able to get from end users? Also include things like RTs / follows / stars here =)
              - textbox "Traction Required question" [ref=e236]: "Live demo is deployed at agoraalpha.vercel.app with 8 generated Polymarket picks, each with public preview metadata and Arc trace anchoring. The paid unlock path was verified end-to-end on /pick/16: mint/approve/unlock was already satisfied on-chain, the API returned HTTP 200 for the full trace after a nonce-bound EIP-191 signature, and replay was rejected with nonce-used. VERIFY.md includes the 11-step cli-unlock transcript, Arcscan transaction link, unlocked page screenshot, package validation, and final sign-off. Public/social traction is intentionally not overclaimed yet; this is a judge-ready hackathon MVP with reproducible evidence rather than a production user-growth launch."
